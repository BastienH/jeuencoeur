<VirtualHost *:8443>
    ServerName _default_

    Alias /static /opt/jeuencoeur/staticfiles
    <Directory /opt/jeuencoeur/staticfiles>
        Require all granted
    </Directory>

    Alias /media /opt/jeuencoeur/media
    <Directory /opt/jeuencoeur/media>
        Require all granted
    </Directory>

    ProxyPass /static/ !
    ProxyPass /media/ !
    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/

    ErrorLog ${APACHE_LOG_DIR}/jeuencoeur-error.log
    CustomLog ${APACHE_LOG_DIR}/jeuencoeur-access.log combined
</VirtualHost>
