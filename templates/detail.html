{% extends 'base.html' %}
{% load i18n genre_tags %}

{% block content %}
<div class="mb-6 flex justify-between items-center">
    <a
        href="{% url 'hub' lang=lang %}"
        class="inline-flex items-center gap-2 text-primary hover:text-primary-dark font-medium min-h-[44px] px-2"
    >
        &larr; {% trans "Back to Hub" %}
    </a>
    <button onclick="document.getElementById('info-modal').classList.remove('hidden')" class="text-gray-400 hover:text-gray-600 min-h-[44px] inline-flex items-center justify-center w-11 rounded-full hover:bg-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd" /></svg>
    </button>
</div>

<div class="text-center mb-8">
    <span class="text-5xl">{{ genre.icon }}</span>
    <h1 class="text-2xl font-bold text-gray-800 mt-2">{{ genre|genre_name:lang }}</h1>
</div>

<div
    id="prompt-container"
    class="bg-white rounded-2xl shadow-lg p-8 mb-8 border border-gray-100"
>
    {% include 'partials/prompt_card.html' %}
</div>

<div class="text-center">
    <button
        hx-get="{% url 'next_prompt' lang=lang %}?genre_slug={{ genre.slug }}"
        hx-target="#prompt-container"
        hx-swap="innerHTML"
        class="bg-primary hover:bg-primary-dark text-white font-bold py-4 px-8 rounded-xl text-lg shadow-md hover:shadow-lg transition-all min-h-[44px]"
    >
        {% trans "Next Prompt" %}
    </button>
</div>
{% endblock %}

{% include 'partials/game_info_modal.html' %}
