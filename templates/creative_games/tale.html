{% extends 'base.html' %}
{% load i18n static %}

{% block content %}
{% csrf_token %}
<div class="mb-6 flex justify-between">
    <a href="{% url 'hub' lang=lang %}" class="text-purple-600 hover:text-purple-800 font-medium min-h-[44px] inline-flex items-center">
        &larr; {% trans "Back to Hub" %}
    </a>
    <a href="{% url 'tale_twisters_vault' lang=lang %}" class="text-purple-600 hover:text-purple-800 font-medium min-h-[44px] inline-flex items-center">
        {% trans "My Vault" %} 📂
    </a>
</div>

<div class="text-center mb-6">
    <span class="text-5xl">{{ genre.icon }}</span>
    <h1 class="text-2xl font-bold text-gray-800 mt-2">{{ genre.name }}</h1>
</div>

<div class="max-w-2xl mx-auto">
    <div id="story-builder" class="bg-white rounded-2xl shadow-lg p-6 mb-6 border border-gray-100">
        <div id="story-phase">
            <p class="text-gray-400 italic text-center py-8">{% trans "Loading..." %}</p>
        </div>
    </div>

    <div id="story-actions" class="flex flex-wrap gap-3 justify-center">
        <button id="save-btn" disabled
                class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-xl text-lg shadow-md min-h-[56px] disabled:opacity-50">
            {% trans "Save & Share" %}
        </button>
        <button id="clear-btn"
                class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-3 px-6 rounded-xl min-h-[44px]">
            {% trans "New Story" %}
        </button>
    </div>

    <div class="mt-4 text-center">
        <span id="phase-indicator" class="inline-flex gap-2">
            <span data-phase="1" class="w-3 h-3 rounded-full bg-gray-300"></span>
            <span data-phase="2" class="w-3 h-3 rounded-full bg-gray-300"></span>
            <span data-phase="3" class="w-3 h-3 rounded-full bg-gray-300"></span>
        </span>
    </div>
</div>

<script src="{% static 'creative_games/tale.js' %}"></script>
{% endblock %}
