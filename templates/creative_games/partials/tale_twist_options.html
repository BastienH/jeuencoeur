{% load i18n %}
<h2 class="text-lg font-semibold text-gray-800 mb-4 text-center">{% trans "Choose a plot twist..." %}</h2>
<div class="grid gap-3">
    {% for twist in twists %}
    <button class="twist-option w-full text-left bg-yellow-50 hover:bg-yellow-100 border-2 border-yellow-200 hover:border-yellow-400 rounded-xl p-4 transition-all min-h-[60px]"
            data-twist-id="{{ twist.id }}">
        <span class="inline-block bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-full text-xs font-medium mb-1">{% trans "Twist" %}</span>
        <p class="text-gray-700 font-medium">{{ twist.display_text }}</p>
    </button>
    {% endfor %}
</div>
