{% load i18n %}
<h2 class="text-lg font-semibold text-gray-800 mb-4 text-center">{% trans "Choose how your story begins..." %}</h2>
<div class="grid gap-3">
    {% for seed in seeds %}
    <button class="seed-option w-full text-left bg-purple-50 hover:bg-purple-100 border-2 border-purple-200 hover:border-purple-400 rounded-xl p-4 transition-all min-h-[60px]"
            data-seed-id="{{ seed.id }}">
        <p class="text-gray-700 font-medium">{{ seed.display_text }}</p>
    </button>
    {% endfor %}
</div>
