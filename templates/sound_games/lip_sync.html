{% extends 'base.html' %}
{% load i18n static genre_tags %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'hub' lang=lang %}" class="text-purple-600 hover:text-purple-800 font-medium min-h-[44px] inline-flex items-center">
        &larr; {% trans "Back to Hub" %}
    </a>
</div>

<div class="text-center mb-6">
    <span class="text-5xl">{{ genre.icon }}</span>
    <h1 class="text-2xl font-bold text-gray-800 mt-2">{{ genre|genre_name:lang }}</h1>
</div>

<div class="max-w-md mx-auto">
    <div id="countdown-display" class="text-6xl font-bold text-center text-purple-600 mb-6 hidden">3</div>

    <div id="sound-container" class="bg-white rounded-2xl shadow-lg p-8 mb-6 border border-gray-100 text-center">
        {% include 'sound_games/partials/lip_sync_sound.html' %}
    </div>

    <div class="flex flex-col gap-3">
        <button id="action-btn"
                class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-8 rounded-xl text-lg shadow-md min-h-[56px]">
            {% trans "3...2...1... ACTION!" %}
        </button>

        <button id="reverse-toggle"
                class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-3 px-6 rounded-xl min-h-[44px] transition-colors">
            {% trans "Reverse Mode: OFF" %}
        </button>

        <button hx-get="{% url 'lip_sync_legends_next' lang=lang %}"
                hx-target="#sound-container"
                hx-swap="innerHTML"
                class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-3 px-6 rounded-xl min-h-[44px]">
            {% trans "Next Sound" %}
        </button>
    </div>

    <div id="reverse-options" class="hidden mt-4 grid grid-cols-2 gap-3">
        <button class="reverse-option bg-purple-50 hover:bg-purple-100 border border-purple-200 rounded-xl p-4 text-sm min-h-[60px]"></button>
        <button class="reverse-option bg-pink-50 hover:bg-pink-100 border border-pink-200 rounded-xl p-4 text-sm min-h-[60px]"></button>
        <button class="reverse-option bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-xl p-4 text-sm min-h-[60px]"></button>
        <button class="reverse-option bg-green-50 hover:bg-green-100 border border-green-200 rounded-xl p-4 text-sm min-h-[60px]"></button>
    </div>
</div>

<script src="{% static 'sound_games/lip_sync.js' %}"></script>
{% endblock %}
