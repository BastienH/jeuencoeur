{% load i18n %}
{% if question %}
<div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
    <h2 class="text-center text-lg font-semibold text-gray-800 mb-6">{% trans "Would you rather..." %}</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button data-vote="a"
                class="vote-btn bg-purple-50 hover:bg-purple-100 border-2 border-purple-200 hover:border-purple-400 rounded-xl p-6 text-center transition-all min-h-[100px]">
            <p class="text-lg font-medium text-gray-700">{{ question.display_a }}</p>
        </button>
        <button data-vote="b"
                class="vote-btn bg-pink-50 hover:bg-pink-100 border-2 border-pink-200 hover:border-pink-400 rounded-xl p-6 text-center transition-all min-h-[100px]">
            <p class="text-lg font-medium text-gray-700">{{ question.display_b }}</p>
        </button>
    </div>
    <div id="vote-result" class="text-center mt-4 text-sm text-gray-500"></div>
</div>
{% else %}
<p class="text-center text-gray-400">{% trans "No questions yet!" %}</p>
{% endif %}
