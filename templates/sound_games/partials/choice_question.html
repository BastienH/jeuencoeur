{% load i18n %}
{% if question %}
<div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
    <h2 class="text-center text-lg font-semibold text-gray-800 mb-6">{% trans "Would you rather..." %}</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button data-vote="a" data-question-id="{{ question.id }}"
                class="vote-btn bg-sunshine-light hover:bg-sunshine/30 border-2 border-sunshine-light hover:border-sunshine rounded-xl p-6 text-center transition-all min-h-[100px]">
            <p class="text-lg font-medium text-gray-700">{{ question.display_a }}</p>
        </button>
        <button data-vote="b" data-question-id="{{ question.id }}"
                class="vote-btn bg-coral-light hover:bg-coral/20 border-2 border-coral-light hover:border-coral rounded-xl p-6 text-center transition-all min-h-[100px]">
            <p class="text-lg font-medium text-gray-700">{{ question.display_b }}</p>
        </button>
    </div>
    <div id="vote-result" class="text-center mt-4 text-sm text-gray-500"></div>
</div>
{% else %}
<p class="text-center text-gray-400">{% trans "No questions yet!" %}</p>
{% endif %}
