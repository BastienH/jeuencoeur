{% load i18n %}
{% if challenge %}
<p class="text-xl md:text-2xl text-gray-700 leading-relaxed font-medium" id="challenge-text">
    {{ challenge.display_text }}
</p>
<span class="inline-block mt-3 bg-purple-100 text-purple-700 text-xs font-medium px-3 py-1 rounded-full">
    {{ challenge.get_age_group_display }} / {{ challenge.get_energy_level_display }}
</span>
{% else %}
<p class="text-gray-400">{% trans "No challenges yet!" %}</p>
{% endif %}
