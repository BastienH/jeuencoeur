{% load i18n %}
{% if sound %}
<p class="text-2xl font-bold text-gray-700">{{ sound.name }}</p>
{% if sound.category %}
<span class="inline-block mt-2 bg-purple-100 text-purple-700 text-xs font-medium px-3 py-1 rounded-full">{{ sound.category }}</span>
{% endif %}
{% else %}
<p class="text-gray-400">{% trans "No sounds yet!" %}</p>
{% endif %}
