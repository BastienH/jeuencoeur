{% load i18n genre_tags %}
{% if car_game %}
<h3 class="font-semibold text-gray-800 mb-2">{{ car_game|car_name:lang }}</h3>
<p class="text-gray-600 text-sm">{{ car_game|car_instructions:lang|linebreaksbr }}</p>
{% else %}
<p class="text-gray-400 text-center">{% trans "Tap the button for a car game!" %}</p>
{% endif %}
