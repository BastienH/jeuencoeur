{% load i18n %}
{% if character %}
<div class="space-y-4 text-center">
    <div>
        <span class="text-xs text-gray-400 uppercase tracking-wide">{% trans "Character" %}</span>
        <div class="flex items-center justify-center gap-2">
            <p class="text-xl font-bold text-purple-700" id="wild-character">{{ character }}</p>
            <button class="reroll-btn reroll-character text-gray-400 hover:text-purple-600 text-lg min-h-[44px] min-w-[44px]" data-target="character" aria-label="{% trans 'Reroll character' %}">🔄</button>
        </div>
    </div>
    <div class="flex items-center justify-center gap-4">
        <div class="h-px w-12 bg-gray-300"></div>
        <span class="text-gray-400">+</span>
        <div class="h-px w-12 bg-gray-300"></div>
    </div>
    <div>
        <span class="text-xs text-gray-400 uppercase tracking-wide">{% trans "Setting" %}</span>
        <div class="flex items-center justify-center gap-2">
            <p class="text-xl font-bold text-pink-700" id="wild-setting">{{ setting }}</p>
            <button class="reroll-btn reroll-setting text-gray-400 hover:text-pink-600 text-lg min-h-[44px] min-w-[44px]" data-target="setting" aria-label="{% trans 'Reroll setting' %}">🔄</button>
        </div>
    </div>
    <div class="flex items-center justify-center gap-4">
        <div class="h-px w-12 bg-gray-300"></div>
        <span class="text-gray-400">+</span>
        <div class="h-px w-12 bg-gray-300"></div>
    </div>
    <div>
        <span class="text-xs text-gray-400 uppercase tracking-wide">{% trans "Activity" %}</span>
        <div class="flex items-center justify-center gap-2">
            <p class="text-xl font-bold text-blue-700" id="wild-activity">{{ activity }}</p>
            <button class="reroll-btn reroll-activity text-gray-400 hover:text-blue-600 text-lg min-h-[44px] min-w-[44px]" data-target="activity" aria-label="{% trans 'Reroll activity' %}">🔄</button>
        </div>
    </div>
</div>
{% else %}
<p class="text-center text-gray-400">{% trans "Tap Spin to get started!" %}</p>
{% endif %}
