<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu en Coeur — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #FFF8F0, #FFE0D6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .heart {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #00796B;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .retry {
            display: inline-block;
            background: #26A69A;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .retry:hover { background: #00796B; }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">💕</div>
        <h1>You're offline!</h1>
        <p>Jeu en Coeur needs a connection the first time you visit, but your favorite games will work offline after that.</p>
        <a href="/" class="retry" onclick="window.location.reload(); return false;">Try again</a>
    </div>
</body>
</html>
