{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">{% trans "Create an Account" %}</h1>
    <form method="post" class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                {{ field.label }}
            </label>
            {{ field }}
            {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-xl min-h-[44px]">
            {% trans "Sign Up" %}
        </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
        {% trans "Already have an account?" %}
        <a href="{% url 'login' lang=lang %}" class="text-purple-600 hover:text-purple-800">{% trans "Log in" %}</a>
    </p>
</div>
{% endblock %}
